// ═══════════════ API LAYER ═══════════════
function showLD(m='Loading...'){document.getElementById('ldOv').classList.remove('hide');document.getElementById('ldMsg').textContent=m}
function hideLD(){document.getElementById('ldOv').classList.add('hide')}

async function apiGet(action){
  try{const r=await fetch(`${API_URL}?action=${action}`);const d=await r.json();if(d.error)throw new Error(d.error);return d}catch(e){console.error('GET '+action,e);return null}
}
async function apiPost(action,payload){
  try{const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action,payload})});const d=await r.json();if(d.error)throw new Error(d.error);return d}catch(e){console.error('POST '+action,e);return null}
}

async function checkConn(){
  const el=document.getElementById('connStatus');
  el.className='lconn load';el.innerHTML='⏳ Connecting to Google Sheets...';
  if(API_URL.includes('YOUR_')){el.className='lconn err';el.innerHTML='❌ API URL not configured — set API_URL in code';apiOk=false;return}
  const r=await apiGet('ping');
  if(r&&r.status==='ok'){el.className='lconn ok';el.innerHTML='✅ Connected to Google Sheets';apiOk=true}
  else{el.className='lconn err';el.innerHTML='❌ Cannot reach Google Sheets API';apiOk=false}
}

async function loadFromSheet(){
  showLD('Loading data from Google Sheets...');
  const d=await apiGet('getAll');
  if(!d){hideLD();return false}

  users=(d.users||[]).map(u=>({id:String(u.id),name:u.name,email:u.email,role:u.role,av:u.avatar||'',col:u.color||'#666',pass:u.password||'',username:(u.email||'').split('@')[0],acc:(u.access||'').split(',').map(a=>a.trim()).filter(Boolean),on:u.active===true||u.active==='TRUE'}));
  works=(d.works||[]).map(w=>({id:parseInt(w.id),title:w.title,desc:w.description||'',pri:w.priority||'Medium',cat:w.createdAt||'',cb:w.createdBy||'',ht:w.hasTask===true||w.hasTask==='TRUE'}));
  tasks=(d.tasks||[]).map(t=>({id:parseInt(t.id),wk:parseInt(t.workId),as:String(t.assignee),st:t.status||'Assigned',sd:t.startDate||'',ed:t.endDate||'',rc:parseInt(t.reassignCount)||0,pg:parseInt(t.progress)||0,cm:[],hi:[]}));
  (d.comments||[]).forEach(c=>{const t=tasks.find(x=>x.id===parseInt(c.taskId));if(t)t.cm.push({by:String(c.by),tx:c.text,dt:c.date})});
  (d.history||[]).forEach(h=>{const t=tasks.find(x=>x.id===parseInt(h.taskId));if(t)t.hi.push({a:h.action,d:h.date,b:String(h.by)})});
  alog=(d.activity||[]).map(a=>({id:parseInt(a.id),u:String(a.userId),a:a.action,d:a.date,t:a.type}));

  nW_=works.length?Math.max(...works.map(w=>w.id))+1:1;
  nT_=tasks.length?Math.max(...tasks.map(t=>t.id))+1:100;
  nU_=users.length?Math.max(...users.map(u=>parseInt(u.id.replace(/\D/g,''))||0))+1:1;
  nA_=alog.length?Math.max(...alog.map(a=>a.id))+1:1;

  document.getElementById('syncSt').textContent='Synced: '+new Date().toLocaleTimeString();
  hideLD();return true;
}

async function syncFromSheet(){
  toast('Syncing...','in');
  const ok=await loadFromSheet();
  if(ok){rA();toast('Data synced!','success')}else toast('Sync failed','error');
}

function eC(uid){
  const et=tasks.filter(t=>t.as===uid);const now=td();

  const dT=run.filter(t=>t.ed===now);const d2=run.filter(t=>{const d=dDf(t.ed,now);return d>=0&&d<=2});

}

function urgC(title,cnt,col,bg,bdr,list){
  let h=`<div class="urg-card" style="background:${bg};border-color:${bdr}"><h4>${title} <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:${col};color:#fff">${cnt}</span></h4>`;
  if(!list.length)h+=`<div style="font-size:12px;color:var(--tx2);padding:4px 0">None ✨</div>`;
  else list.slice(0,4).forEach(t=>{const w=W(t.wk);h+=`<div class="urg-task" onclick="oTD(${t.id})"><div class="pb" style="height:14px;background:${PC[w?.pri]||'#ccc'}"></div><span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500">${w?.title||''}</span><span class="urg-time" style="color:${col}">${timeL(t.ed)}</span></div>`});
  if(list.length>4)h+=`<div style="font-size:10px;color:${col};font-weight:600;margin-top:4px">+${list.length-4} more</div>`;
  return h+`</div>`}

function oCW(){window._cp="Medium";oM(`<div class="mdlh"><div style="font-weight:800;font-size:17px">Create Work</div><button style="background:none;border:none;color:var(--tx3);font-size:18px" onclick="cM()">✕</button></div><div class="mdlb"><div style="margin-bottom:14px"><label class="lbl">Title <span class="rq">*</span></label><input class="inp" id="cwT" placeholder="Work title"></div><div style="margin-bottom:14px"><label class="lbl">Description</label><textarea class="inp" id="cwD" rows="3" placeholder="Describe..."></textarea></div><div style="margin-bottom:14px"><label class="lbl">Priority</label><div class="pbs">${["Low","Medium","High","Urgent"].map(p=>`<button class="pbt" id="cwP_${p}" onclick="sP('${p}')" style="${p==='Medium'?`border-color:${PC[p]};color:${PC[p]};background:${PC[p]}08`:''}">${p}</button>`).join('')}</div></div></div><div class="mdlf"><button class="btn bo" onclick="cM()">Cancel</button><button class="btn ba" onclick="dCW()">Create</button></div>`)}
function sP(p){window._cp=p;["Low","Medium","High","Urgent"].forEach(x=>{const b=document.getElementById('cwP_'+x);const s=x===p;b.style.borderColor=s?PC[x]:'';b.style.color=s?PC[x]:'';b.style.background=s?PC[x]+'08':''})}
async function dCW(){const t=document.getElementById('cwT').value.trim();if(!t){toast("Title required","error");return}const w={id:nW_++,title:t,desc:document.getElementById('cwD').value,pri:window._cp,cat:td(),cb:CU.id,ht:false};works.push(w);await svWork(w);logA(`created '${t}'`,"work");toast("Created!","success");cM()}

function oAW(wid){const w=W(wid);window._aw=w;window._aa="";oM(`<div class="mdlh"><div><div style="font-size:9px;color:var(--ac);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px">Assign → Create Task</div><div style="font-weight:800;font-size:17px">${w.title}</div></div><button style="background:none;border:none;color:var(--tx3);font-size:18px" onclick="cM()">✕</button></div><div class="mdlb"><label class="lbl">Assign To <span class="rq">*</span></label>${users.filter(u=>u.on).map(m=>{const a=aCt(m.id);const ld=a>=3?"Busy":a>=1?"Active":"Free";const lc=a>=3?"#dc2626":a>=1?"#d97706":"#16a34a";return`<div class="tpk" id="aP_${m.id}" onclick="sAs('${m.id}')">${aH(m,28)}<div style="flex:1"><div style="font-size:12px;font-weight:600">${m.name}</div><div style="font-size:10px;color:var(--tx2)">${m.role}</div></div><div style="font-size:10px;font-weight:600;color:${lc}">${a} · ${ld}</div><div id="aC_${m.id}" class="hide" style="width:18px;height:18px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg></div></div>`}).join('')}<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px"><div><label class="lbl">Start <span class="rq">*</span></label><input type="date" class="inp" id="aS" value="${td()}"></div><div><label class="lbl">End <span class="rq">*</span></label><input type="date" class="inp" id="aE"></div></div></div><div class="mdlf"><button class="btn bo" onclick="cM()">Cancel</button><button class="btn ba" onclick="dAW()">Assign</button></div>`,"540px")}
function sAs(id){window._aa=id;users.forEach(m=>{const el=document.getElementById('aP_'+m.id);const ck=document.getElementById('aC_'+m.id);if(el)el.className='tpk'+(m.id===id?' sel':'');if(ck){ck.classList.toggle('hide',m.id!==id);if(m.id===id)ck.style.display='flex'}})}
async function dAW(){const a=window._aa,s=document.getElementById('aS').value,e=document.getElementById('aE').value;if(!a||!s||!e){toast("All fields required","error");return}const w=window._aw;const hi={a:`Assigned to ${U(a).name}`,d:td(),b:CU.id};const t={id:nT_++,wk:w.id,as:a,st:"Assigned",sd:s,ed:e,rc:0,pg:0,cm:[],hi:[hi]};tasks.push(t);const wi=works.findIndex(x=>x.id===w.id);if(wi>=0)works[wi].ht=true;await svTask(t);await upWork(works[wi]);await svHi(t.id,hi);addN(`Task '${w.title}' assigned`,t.id,a);logA(`assigned '${w.title}' to ${U(a).name}`,"task");toast("Task created!","success");cM()}

function oTD(tid){const t=tasks.find(x=>x.id===tid);if(!t)return;const w=W(t.wk);const a=U(t.as);const od=isOD(t);const isMe=t.as===CU.id;document.getElementById('nP')?.classList.add('hide');
  oM(`<div style="padding:18px 22px;border-bottom:1px solid #eee"><div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap">${sB(t.st)} ${pB(w?.pri||'')} ${od?'<span style="font-size:9px;background:var(--redbg);color:var(--red);padding:2px 6px;border-radius:5px;font-weight:700">OVERDUE</span>':''} ${t.rc>0?`<span style="font-size:9px;background:var(--ylwbg);color:#a16207;padding:2px 6px;border-radius:5px">×${t.rc}</span>`:''} <span style="font-size:10px;font-weight:600;margin-left:auto">${timeL(t.ed)}</span></div>
    <div style="font-weight:800;font-size:17px;display:flex;justify-content:space-between">${w?.title||''}<button style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:18px" onclick="cM()">✕</button></div></div>
  <div style="padding:20px 22px">
    <div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:600;color:var(--tx2)">Progress</span><span style="font-size:11px;font-weight:700;font-family:var(--mono);color:var(--ac)">${t.pg||0}%</span></div><div style="height:5px;border-radius:3px;background:#eee"><div style="height:100%;border-radius:3px;background:var(--ac);width:${t.pg||0}%"></div></div>${isMe&&t.st==="In Progress"?`<input type="range" min="0" max="100" value="${t.pg||0}" style="width:100%;margin-top:5px;accent-color:var(--ac)" oninput="uPg(${t.id},this.value)">`:''}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="padding:10px;border-radius:9px;background:var(--s2);border:1px solid var(--bd)"><div style="font-size:9px;color:var(--tx3);margin-bottom:2px;font-weight:600">Assigned</div>${a?`<div style="display:flex;align-items:center;gap:4px">${aH(a,18)}<span style="font-size:11px;font-weight:600">${a.name}</span></div>`:'—'}</div>
      <div style="padding:10px;border-radius:9px;background:var(--s2);border:1px solid var(--bd)"><div style="font-size:9px;color:var(--tx3);margin-bottom:2px;font-weight:600">Start</div><div style="font-size:11px;font-weight:600;font-family:var(--mono)">${fD(t.sd)}</div></div>
      <div style="padding:10px;border-radius:9px;background:var(--s2);border:1px solid ${od?'#fca5a5':'var(--bd)'}"><div style="font-size:9px;color:var(--tx3);margin-bottom:2px;font-weight:600">Deadline</div><div style="font-size:11px;font-weight:600;font-family:var(--mono);color:${od?'var(--red)':'var(--tx)'}">${fD(t.ed)}</div></div></div>
    ${w?.desc?`<div style="margin-bottom:14px;padding:12px;border-radius:9px;background:var(--s2);border:1px solid var(--bd);font-size:12px;color:#555;line-height:1.5">${w.desc}</div>`:''}
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
      ${isMe&&(t.st==="Assigned"||t.st==="Reassigned")?`<button class="btn ba" onclick="doSt(${t.id})">▶ Start</button>`:''}
      ${isMe&&t.st==="In Progress"?`<button class="btn bg" onclick="doCo(${t.id})">✓ Complete</button>`:''}
      ${isTL()&&t.st==="Completed"?`<button class="btn bg" onclick="doAp(${t.id})">✓ Approve</button><button class="btn br" onclick="document.getElementById('rjF').classList.toggle('hide')">✕ Reject</button>`:''}</div>
    <div id="rjF" class="hide" style="margin-bottom:14px;padding:14px;border-radius:10px;background:var(--redbg);border:1px solid #fecaca"><div style="margin-bottom:8px"><label class="lbl">Reason</label><input class="inp" id="rjR" placeholder="Why?"></div><div style="margin-bottom:10px"><label class="lbl">Reassign To</label><select class="inp" id="rjA"><option value="">Select</option>${users.filter(u=>u.on).map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select></div><button class="btn br" onclick="doRj(${t.id})">Confirm</button></div>
    <div class="tbs"><button class="tbt on" onclick="sTT('c',this)">Comments (${(t.cm||[]).length})</button><button class="tbt" onclick="sTT('h',this)">History (${t.hi.length})</button></div>
    <div id="td-c">${(t.cm||[]).map(c=>{const cu=U(c.by);return`<div style="display:flex;gap:7px;margin-bottom:10px">${cu?aH(cu,22):''}<div style="flex:1;background:var(--s2);border-radius:9px;padding:9px 11px;border:1px solid var(--bd)"><div style="font-size:11px;font-weight:600">${cu?.name||''}</div><div style="font-size:12px;color:#555">${c.tx}</div><div style="font-size:9px;color:var(--tx3);font-family:var(--mono);margin-top:2px">${fD(c.dt)}</div></div></div>`}).join('')}<div style="display:flex;gap:6px;margin-top:6px"><input class="inp" id="cmI" placeholder="Comment..." style="flex:1" onkeydown="if(event.key==='Enter')aCm(${t.id})"><button class="btn ba bsm" onclick="aCm(${t.id})">Send</button></div></div>
    <div id="td-h" class="hide"><div class="tl">${t.hi.map((h,i)=>`<div class="tli"><div class="tld ${i===t.hi.length-1?'on':''}"></div><div style="font-size:12px;font-weight:500;color:#333">${h.a}</div><div style="font-size:10px;color:var(--tx3);font-family:var(--mono);margin-top:1px">${fD(h.d)} · ${U(h.b)?.name||''}</div></div>`).join('')}</div></div></div>`,"600px")}

function sTT(t,b){document.querySelectorAll('.tbt').forEach(x=>x.classList.remove('on'));b.classList.add('on');document.getElementById('td-c').classList.toggle('hide',t!=='c');document.getElementById('td-h').classList.toggle('hide',t!=='h')}
function uPg(tid,v){const i=tasks.findIndex(t=>t.id===tid);if(i>=0){tasks[i].pg=parseInt(v);clearTimeout(window._pt);window._pt=setTimeout(()=>upTask(tasks[i]),1000)}}
async function aCm(tid){const inp=document.getElementById('cmI');const tx=inp?.value?.trim();if(!tx)return;const i=tasks.findIndex(t=>t.id===tid);if(i>=0){const cm={by:CU.id,tx,dt:td()};tasks[i].cm.push(cm);await svCm(tid,cm);toast("Added","success");oTD(tid)}}

async function doSt(tid){const i=tasks.findIndex(t=>t.id===tid);if(i<0)return;tasks[i].st="In Progress";tasks[i].pg=tasks[i].pg||10;const hi={a:"Started",d:td(),b:CU.id};tasks[i].hi.push(hi);await upTask(tasks[i]);await svHi(tid,hi);logA(`started '${W(tasks[i].wk)?.title}'`,"task");toast("Started!","success");cM()}
async function doCo(tid){const i=tasks.findIndex(t=>t.id===tid);if(i<0)return;const w=W(tasks[i].wk);tasks[i].st="Completed";tasks[i].pg=100;const hi={a:"Marked complete",d:td(),b:CU.id};tasks[i].hi.push(hi);await upTask(tasks[i]);await svHi(tid,hi);addN(`${CU.name} completed '${w?.title}'`,tid,"u1");logA(`completed '${w?.title}'`,"task");toast("Done!","success");cM()}
async function doAp(tid){const i=tasks.findIndex(t=>t.id===tid);if(i<0)return;const w=W(tasks[i].wk);tasks[i].st="Approved";const hi={a:"Approved",d:td(),b:CU.id};tasks[i].hi.push(hi);await upTask(tasks[i]);await svHi(tid,hi);addN(`Approved '${w?.title}'`,tid,tasks[i].as);logA(`approved '${w?.title}'`,"approve");toast("Approved!","success");cM()}
async function doRj(tid){const r=document.getElementById('rjR')?.value?.trim();const na=document.getElementById('rjA')?.value;if(!r||!na){toast("Fill all","error");return}const i=tasks.findIndex(t=>t.id===tid);if(i<0)return;const w=W(tasks[i].wk);tasks[i].st="Reassigned";tasks[i].as=na;tasks[i].rc=(tasks[i].rc||0)+1;tasks[i].pg=0;const h1={a:`Rejected – ${r}`,d:td(),b:CU.id},h2={a:`Reassigned to ${U(na).name}`,d:td(),b:CU.id};tasks[i].hi.push(h1,h2);await upTask(tasks[i]);await svHi(tid,h1);await svHi(tid,h2);addN(`Rejected '${w?.title}'`,tid,na);logA(`rejected '${w?.title}'`,"reject");toast("Reassigned","in");cM()}

function oCU(){window._na=[AC.D,AC.T];oM(`<div class="mdlh"><div style="font-weight:800;font-size:17px">Create User</div><button style="background:none;border:none;color:var(--tx3);font-size:18px" onclick="cM()">✕</button></div><div class="mdlb"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px"><div><label class="lbl">Name <span class="rq">*</span></label><input class="inp" id="nuN" placeholder="Full name"></div><div><label class="lbl">Email <span class="rq">*</span></label><input class="inp" id="nuE" placeholder="email@company.com"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px"><div><label class="lbl">Role</label><select class="inp" id="nuR"><option>Junior</option><option>Senior</option><option>Team Lead</option></select></div><div><label class="lbl">Password</label><input class="inp" id="nuP" placeholder="Password"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px"><div><label class="lbl">Initials</label><input class="inp" id="nuA" maxlength="2" placeholder="AB"></div><div><label class="lbl">Color</label><input type="color" id="nuC" value="#7c3aed" style="width:100%;height:40px;border:1px solid var(--bd);border-radius:8px;cursor:pointer"></div></div><label class="lbl">Access</label><div class="acg">${[{k:AC.D,l:"Dashboard",i:"📊"},{k:AC.W,l:"Works",i:"📦"},{k:AC.T,l:"Tasks",i:"📋"},{k:AC.K,l:"Kanban",i:"⊞"},{k:AC.R,l:"Reports",i:"📈"},{k:AC.A,l:"Activity",i:"📝"},{k:AC.U,l:"Users",i:"⚙️"},{k:AC.TD,l:"Team Dash",i:"👥"}].map(a=>`<div class="aci ${[AC.D,AC.T].includes(a.k)?'on':''}" onclick="tNA('${a.k}',this)"><div style="font-size:14px;width:28px;text-align:center">${a.i}</div><div style="flex:1;font-size:11px;font-weight:600">${a.l}</div><div class="atg ${[AC.D,AC.T].includes(a.k)?'on':''}"></div></div>`).join('')}</div></div><div class="mdlf"><button class="btn bo" onclick="cM()">Cancel</button><button class="btn ba" onclick="dCU()">Create</button></div>`,"560px")}
function tNA(k,el){const i=window._na.indexOf(k);if(i>=0)window._na.splice(i,1);else window._na.push(k);el.classList.toggle('on');el.querySelector('.atg').classList.toggle('on')}
async function dCU(){const n=document.getElementById('nuN').value.trim(),e=document.getElementById('nuE').value.trim(),p=document.getElementById('nuP').value.trim();if(!n||!e||!p){toast("Name, email & password required","error");return}const u={id:"u"+(nU_++),name:n,email:e,role:document.getElementById('nuR').value,av:document.getElementById('nuA').value.toUpperCase()||n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase(),col:document.getElementById('nuC').value,pass:p,acc:[...window._na],on:true};users.push(u);await svUser(u);logA(`created user ${n}`,"user");toast("Created!","success");cM()}

function oEU(uid){const u=users.find(x=>x.id===uid);if(!u)return;window._ea=[...u.acc];oM(`<div class="mdlh"><div style="font-weight:800;font-size:17px">Edit: ${u.name}</div><button style="background:none;border:none;color:var(--tx3);font-size:18px" onclick="cM()">✕</button></div><div class="mdlb"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px;border-radius:10px;background:var(--s2);border:1px solid var(--bd)">${aH(u,44)}<div style="flex:1"><div style="font-size:15px;font-weight:700">${u.name}</div><div style="font-size:11px;color:var(--tx2)">${u.email}</div></div><div><div class="atg ${u.on?'on':''}" onclick="tUA('${u.id}',this)" style="cursor:pointer"></div><div style="font-size:9px;color:var(--tx2);margin-top:2px;text-align:center" id="uSt">${u.on?'Active':'Off'}</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px"><div><label class="lbl">Name</label><input class="inp" id="euN" value="${u.name}"></div><div><label class="lbl">Email</label><input class="inp" id="euE" value="${u.email}"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px"><div><label class="lbl">Role</label><select class="inp" id="euR"><option ${u.role==='Junior'?'selected':''}>Junior</option><option ${u.role==='Senior'?'selected':''}>Senior</option><option ${u.role==='Team Lead'?'selected':''}>Team Lead</option></select></div><div><label class="lbl">New Password</label><input class="inp" id="euP" placeholder="Leave blank to keep"></div></div><label class="lbl">Access</label><div class="acg">${[{k:AC.D,l:"Dashboard",i:"📊"},{k:AC.W,l:"Works",i:"📦"},{k:AC.T,l:"Tasks",i:"📋"},{k:AC.K,l:"Kanban",i:"⊞"},{k:AC.R,l:"Reports",i:"📈"},{k:AC.A,l:"Activity",i:"📝"},{k:AC.U,l:"Users",i:"⚙️"},{k:AC.TD,l:"Team Dash",i:"👥"}].map(a=>`<div class="aci ${u.acc.includes(a.k)?'on':''}" onclick="tEA('${a.k}',this)"><div style="font-size:14px;width:28px;text-align:center">${a.i}</div><div style="flex:1;font-size:11px;font-weight:600">${a.l}</div><div class="atg ${u.acc.includes(a.k)?'on':''}"></div></div>`).join('')}</div></div><div class="mdlf"><button class="btn bo" onclick="cM()">Cancel</button><button class="btn ba" onclick="dEU('${u.id}')">Save</button></div>`,"560px")}
function tUA(uid,el){const i=users.findIndex(u=>u.id===uid);if(i>=0){users[i].on=!users[i].on;el.classList.toggle('on');document.getElementById('uSt').textContent=users[i].on?'Active':'Off'}}
function tEA(k,el){const i=window._ea.indexOf(k);if(i>=0)window._ea.splice(i,1);else window._ea.push(k);el.classList.toggle('on');el.querySelector('.atg').classList.toggle('on')}
async function dEU(uid){const i=users.findIndex(u=>u.id===uid);if(i<0)return;users[i].name=document.getElementById('euN').value.trim()||users[i].name;users[i].email=document.getElementById('euE').value.trim()||users[i].email;users[i].role=document.getElementById('euR').value;const np=document.getElementById('euP').value.trim();if(np)users[i].pass=np;users[i].acc=[...window._ea];if(CU.id===uid)CU=users[i];await upUser(users[i]);logA(`updated ${users[i].name}`,"user");toast("Saved!","success");cM()}

// INIT
(function(){checkConn();window.addEventListener('resize',()=>{document.getElementById('mT')?.classList.toggle('hide',window.innerWidth>900)})})();
</script>
