<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ResearchFlow · Work & Task Management</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- PWA Meta -->
<meta name="theme-color" content="#4338ca">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ResearchFlow">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="ResearchFlow">
<meta name="description" content="Advanced work and task management for research departments">
<meta name="msapplication-TileColor" content="#4338ca">
<meta name="msapplication-tap-highlight" content="no">
<meta name="format-detection" content="telephone=no">

<!-- PWA Manifest & Icons -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
:root{
  --bg:#f0eeea;--s:#fff;--s2:#f8f7f4;--bd:#e2dfd7;
  --tx:#19180f;--tx2:#78756a;--tx3:#b3b0a5;
  --ac:#4338ca;--ac2:#6366f1;--acbg:#eef2ff;--acbd:#c7d2fe;
  --red:#dc2626;--redbg:#fef2f2;--grn:#16a34a;--grnbg:#f0fdf4;
  --blu:#2563eb;--blubg:#eff6ff;--ylw:#d97706;--ylwbg:#fffbeb;--pnk:#db2777;
  --mono:'JetBrains Mono',monospace;--sans:'Plus Jakarta Sans',sans-serif;
  --sh:0 1px 3px rgba(0,0,0,0.04);--sh2:0 4px 16px rgba(0,0,0,0.07);
  --sh3:0 12px 40px rgba(0,0,0,0.12);--r:10px;--r2:14px;--r3:18px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
button{cursor:pointer;font-family:inherit}
select,input,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#d5d2c8;border-radius:3px}
.hide{display:none!important}

/* ── LOGIN ── */
#LS{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#19180f;position:relative;overflow:hidden;padding:16px}
#LS::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(67,56,202,0.14),transparent 70%);top:-150px;right:-150px}
.lc{background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.07);border-radius:24px;padding:40px 36px;width:min(420px,100%);position:relative;z-index:1;box-shadow:0 40px 80px rgba(0,0,0,0.4)}
.ll{display:flex;align-items:center;gap:12px;margin-bottom:30px}
.ll .lb{width:42px;height:42px;border-radius:12px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;font-family:var(--mono);flex-shrink:0}
.ll h1{font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.03em}
.ll span{display:block;font-size:9px;color:rgba(255,255,255,0.3);font-family:var(--mono);letter-spacing:0.1em}
.lf{margin-bottom:16px}
.lf label{display:block;font-size:10px;font-weight:600;color:rgba(255,255,255,0.4);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em}
.lf input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 15px;color:#fff;font-size:14px;outline:none;transition:border 0.2s}
.lf input:focus{border-color:var(--ac)}
.lbt{width:100%;padding:13px;border:none;border-radius:10px;background:var(--ac);color:#fff;font-size:14px;font-weight:700;transition:all 0.2s;margin-top:4px}
.lbt:hover{background:var(--ac2)}
.le{color:#f87171;font-size:12px;margin-top:6px;display:none}
.lconn{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:11px;display:flex;align-items:center;gap:8px;font-weight:600}
.lconn.ok{background:rgba(22,163,106,0.1);color:#22c55e;border:1px solid rgba(22,163,106,0.2)}
.lconn.er{background:rgba(220,38,38,0.1);color:#f87171;border:1px solid rgba(220,38,38,0.2)}
.lconn.ld{background:rgba(99,102,241,0.1);color:#a5b4fc;border:1px solid rgba(99,102,241,0.2)}
.lh{margin-top:14px;padding:12px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05)}
.lh p{font-size:11px;color:rgba(255,255,255,0.25);line-height:1.7;font-family:var(--mono)}

/* ── LOADING OVERLAY ── */
#ldOv{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#ldOv .sp{width:38px;height:38px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
#ldMsg{color:#fff;font-size:13px;font-weight:600}

/* ── APP SHELL ── */
#AP{display:none;min-height:100vh}

/* ── SIDEBAR ── */
.sb{position:fixed;left:0;top:0;bottom:0;width:248px;background:#19180f;color:#fff;display:flex;flex-direction:column;z-index:40;transition:transform 0.3s}
.sl{padding:16px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.06)}
.sl .bd{width:30px;height:30px;border-radius:8px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;font-family:var(--mono);flex-shrink:0}
.sl h2{font-size:13px;font-weight:700}
.sl small{display:block;font-size:8px;color:rgba(255,255,255,0.25);font-family:var(--mono);letter-spacing:0.08em}
.su{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:9px}
.su .un{font-size:12px;font-weight:600}
.su .ur{font-size:9px;color:rgba(255,255,255,0.3)}
.sn{flex:1;padding:8px 6px;overflow-y:auto}
.ss{font-size:8px;font-weight:700;color:rgba(255,255,255,0.18);text-transform:uppercase;letter-spacing:0.1em;padding:12px 10px 4px}
.sk{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;border:none;background:transparent;color:rgba(255,255,255,0.4);font-size:12px;font-weight:500;width:100%;text-align:left;transition:all 0.15s;position:relative}
.sk:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.8)}
.sk.on{background:rgba(67,56,202,0.15);color:#fff}
.sk.on::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 2px 2px 0;background:var(--ac)}
.sk svg{width:14px;height:14px;flex-shrink:0}
.sk .ct{margin-left:auto;background:var(--red);color:#fff;font-size:8px;font-weight:700;border-radius:99px;padding:1px 6px}
.sk.sub{padding-left:34px;font-size:11px}
.sf{padding:10px 18px;border-bottom:0;border-top:1px solid rgba(255,255,255,0.06);padding-bottom:calc(10px + var(--safe-bottom))}
.sst{font-size:9px;color:rgba(255,255,255,0.18);margin-bottom:6px;font-family:var(--mono)}
.so{display:flex;align-items:center;gap:7px;background:none;border:none;color:rgba(255,255,255,0.3);font-size:11px;font-weight:500;padding:6px 0;width:100%}
.so:hover{color:var(--red)}

/* ── TOPBAR ── */
.tb{position:fixed;top:0;left:248px;right:0;height:54px;background:rgba(240,238,234,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:30}
.tb h2{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:-0.02em}
.tb h2 small{font-size:10px;font-weight:500;color:var(--tx2);background:var(--s2);padding:2px 8px;border-radius:6px;border:1px solid var(--bd)}
.tbr{display:flex;align-items:center;gap:8px}
.tbb{width:34px;height:34px;border-radius:8px;border:1px solid var(--bd);background:var(--s);display:flex;align-items:center;justify-content:center;position:relative;transition:all 0.15s}
.tbb:hover{border-color:var(--acbd);background:var(--acbg)}
.tbd{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;font-size:8px;font-weight:700;border-radius:99px;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center}
.sbtn{padding:5px 12px;border-radius:7px;border:1px solid var(--bd);background:var(--s);color:var(--tx2);font-size:11px;font-weight:600;transition:all 0.15s}
.sbtn:hover{border-color:var(--acbd);background:var(--acbg);color:var(--ac)}

/* ── CONTENT ── */
.ctt{margin-left:248px;padding:70px 20px 32px}

/* ── COMPONENTS ── */
.cd{background:var(--s);border-radius:var(--r2);border:1px solid var(--bd);overflow:hidden;box-shadow:var(--sh)}
.cdh{padding:13px 18px;border-bottom:1px solid #eeece6;display:flex;justify-content:space-between;align-items:center}
.cdh h3{font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px}
.inp{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:9px 13px;color:var(--tx);font-size:13px;outline:none;transition:border 0.2s}
.inp:focus{border-color:var(--ac)}
textarea.inp{resize:vertical}
.lbl{font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:5px;display:block}
.lbl .rq{color:var(--red)}
.btn{padding:7px 16px;border-radius:8px;border:none;font-size:12px;font-weight:600;transition:all 0.15s;display:inline-flex;align-items:center;gap:5px}
.ba{background:var(--ac);color:#fff}.ba:hover{background:var(--ac2)}
.bg{background:var(--grn);color:#fff}.bg:hover{filter:brightness(1.08)}
.br{background:var(--red);color:#fff}.br:hover{filter:brightness(1.08)}
.bo{background:var(--s);border:1px solid var(--bd);color:var(--tx2)}.bo:hover{border-color:var(--acbd);background:var(--acbg);color:var(--ac)}
.bgh{background:transparent;border:none;color:var(--tx2);padding:4px 8px}.bgh:hover{color:var(--ac)}
.bsm{padding:5px 11px;font-size:10px}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:16px;font-size:10px;font-weight:600;white-space:nowrap}
.bdg .dt{width:5px;height:5px;border-radius:50%;display:inline-block}
.av{border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--mono);flex-shrink:0}

/* ── STAT GRID ── */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;margin-bottom:16px}
.sc{background:var(--s);border-radius:var(--r2);padding:15px 16px;border:1px solid var(--bd);position:relative;overflow:hidden;box-shadow:var(--sh);transition:transform 0.15s,box-shadow 0.15s}
.sc:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.sc .ob{position:absolute;top:-16px;right:-16px;width:60px;height:60px;border-radius:50%;opacity:0.06}

/* ── URGENCY ── */
.urg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:16px}
.uc{border-radius:var(--r2);padding:16px 18px;border:1px solid}
.uc h4{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.utask{display:flex;align-items:center;gap:7px;padding:6px 0;border-top:1px solid rgba(0,0,0,0.05);font-size:11px;cursor:pointer}
.utask:hover{opacity:0.8}
.utm{font-size:9px;font-family:var(--mono);font-weight:600;margin-left:auto;white-space:nowrap}

/* ── METRICS ── */
.mtr{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;margin-bottom:16px}
.mc{background:var(--s);border-radius:var(--r2);padding:16px 18px;border:1px solid var(--bd);display:flex;align-items:center;gap:14px;box-shadow:var(--sh)}
.mr{width:52px;height:52px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mr svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.mr .mrv{font-size:13px;font-weight:800;font-family:var(--mono)}

/* ── MEMBER CARDS ── */
.mdc{background:var(--s);border-radius:var(--r2);border:1px solid var(--bd);overflow:hidden;box-shadow:var(--sh);transition:transform 0.15s,box-shadow 0.15s;cursor:pointer}
.mdc:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.mdch{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f0efe8}
.mdcs{display:grid;grid-template-columns:repeat(4,1fr)}
.mdcsi{padding:10px;text-align:center;border-right:1px solid #f0efe8}
.mdcsi:last-child{border-right:none}
.mdcsi .v{font-size:17px;font-weight:800;font-family:var(--mono)}
.mdcsi .l{font-size:8px;color:var(--tx3);margin-top:2px}
.mdct{padding:9px 13px;border-top:1px solid #f0efe8;background:var(--s2)}
.mdcti{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:10px}

/* ── MEMBER DETAIL HEADER ── */
.mdh{display:flex;align-items:center;gap:16px;padding:20px;background:var(--s);border-radius:var(--r2);border:1px solid var(--bd);margin-bottom:16px}
.mdh .mda{width:54px;height:54px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;font-family:var(--mono)}

/* ── FILTER / ROWS / TABLE ── */
.fb{display:flex;gap:3px;flex-wrap:wrap}
.fbt{padding:5px 11px;border-radius:5px;font-size:10px;font-weight:600;border:1px solid var(--bd);background:var(--s);color:var(--tx2);transition:all 0.12s}
.fbt.on{background:#19180f;color:#fff;border-color:#19180f}
.rw{background:var(--s);border-radius:var(--r);border:1px solid var(--bd);padding:13px 18px;display:flex;align-items:center;gap:11px;transition:all 0.15s;margin-bottom:7px;box-shadow:var(--sh)}
.rw:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.rw.ck{cursor:pointer}
.pb{width:4px;border-radius:2px;flex-shrink:0}
.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt th{padding:10px 15px;text-align:left;font-weight:700;color:var(--tx2);font-size:10px;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid #eee;background:var(--s2)}
.rt td{padding:11px 15px;border-bottom:1px solid #f5f5f0}
.rt tr:hover td{background:var(--s2)}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:12px}
.mdl{background:var(--s);border-radius:var(--r3);border:1px solid var(--bd);box-shadow:0 24px 60px rgba(0,0,0,0.14);max-height:90vh;overflow:auto;width:100%}
.mdlh{padding:18px 22px;border-bottom:1px solid #eee}
.mdlb{padding:20px 22px}
.mdlf{padding:14px 22px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:8px}

/* ── TIMELINE ── */
.tl{position:relative;padding-left:18px}
.tl::before{content:'';position:absolute;left:4px;top:4px;bottom:4px;width:2px;background:#ece9e0;border-radius:1px}
.tli{position:relative;margin-bottom:11px}
.tld{position:absolute;left:-17px;top:4px;width:9px;height:9px;border-radius:50%;border:2px solid #fff;background:#ddd}
.tld.on{background:var(--ac)}

/* ── FLOW ── */
.flw{display:flex;align-items:center;gap:0;flex-wrap:wrap;justify-content:center}
.flwn{padding:7px 12px;border-radius:8px;text-align:center;min-width:72px}
.flwn .fv{font-size:17px;font-weight:800;font-family:var(--mono)}
.flwn .fl{font-size:8px;color:#999;margin-top:1px;font-weight:600}
.flwa{padding:0 3px;color:#ccc;font-size:13px}

/* ── WORKLOAD ── */
.wg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:14px}
.wc{padding:13px;border-radius:10px;border:1px solid #eee;background:var(--s2)}
.cpb{height:3px;border-radius:2px;background:#eee;margin-top:8px}
.cpf{height:100%;border-radius:2px;transition:width 0.4s}

/* ── KANBAN ── */
.kb{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.kbc{background:var(--s2);border-radius:var(--r2);border:1px solid var(--bd);min-height:140px}
.kbch{padding:10px 13px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px}
.kbcc{margin:6px;padding:11px;background:var(--s);border-radius:9px;border:1px solid var(--bd);cursor:pointer;transition:all 0.15s;box-shadow:var(--sh)}
.kbcc:hover{box-shadow:var(--sh2);transform:translateY(-1px)}

/* ── ACCESS TOGGLES ── */
.acg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.aci{padding:9px;border-radius:8px;border:2px solid var(--bd);background:var(--s);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:8px}
.aci.on{border-color:var(--ac);background:var(--acbg)}
.atg{width:34px;height:18px;border-radius:9px;background:#ddd;position:relative;transition:background 0.2s;margin-left:auto;flex-shrink:0}
.atg.on{background:var(--ac)}
.atg::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform 0.2s}
.atg.on::after{transform:translateX(16px)}

/* ── TEAM PICK ── */
.tpk{padding:9px 11px;border-radius:8px;border:2px solid var(--bd);background:var(--s);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.15s;margin-bottom:5px}
.tpk:hover{border-color:var(--acbd)}
.tpk.sel{border-color:var(--ac);background:var(--acbg)}

/* ── BARCHART ── */
.brt{display:flex;height:16px;border-radius:5px;overflow:hidden;background:#f0efe8;margin-left:34px}
.brs{min-width:3px;transition:width 0.5s}

/* ── PRI BTNS ── */
.pbs{display:flex;gap:6px}
.pbt{flex:1;padding:9px 0;border-radius:7px;border:2px solid var(--bd);background:var(--s);font-size:11px;font-weight:600;color:var(--tx2);transition:all 0.15s}

/* ── TABS ── */
.tbs{display:flex;gap:2px;margin-bottom:14px;border-bottom:1px solid var(--bd)}
.tbt{padding:8px 14px;border:none;background:transparent;font-size:11px;font-weight:600;color:var(--tx2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s}
.tbt.on{color:var(--ac);border-bottom-color:var(--ac)}

/* ── SEARCH ── */
.srch{position:relative}
.srch input{padding-left:32px}
.srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tx3)}

/* ── TOAST ── */
.twp{position:fixed;bottom:calc(20px + var(--safe-bottom));right:16px;z-index:200;display:flex;flex-direction:column;gap:6px}
.tst{padding:11px 16px;border-radius:9px;background:#19180f;color:#fff;font-size:12px;font-weight:500;box-shadow:var(--sh3);display:flex;align-items:center;gap:7px;animation:tin 0.3s;max-width:340px}
.tst.ok{border-left:4px solid var(--grn)}.tst.er{border-left:4px solid var(--red)}.tst.in{border-left:4px solid var(--blu)}

/* ── PWA INSTALL BANNER ── */
#pwaBar{position:fixed;bottom:calc(16px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:#19180f;color:#fff;padding:12px 16px;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,0.3);z-index:250;display:flex;align-items:center;gap:12px;max-width:calc(100vw - 32px);width:360px;border:1px solid rgba(255,255,255,0.1);animation:tin 0.3s ease-out}
#pwaBar .pi{width:38px;height:38px;border-radius:10px;background:var(--ac);display:flex;align-items:center;justify-content:center;flex-shrink:0}
#pwaBar .pt{flex:1}
#pwaBar .pt b{display:block;font-size:12px;font-weight:700;margin-bottom:1px}
#pwaBar .pt span{font-size:10px;color:rgba(255,255,255,0.45)}

/* ── ONLINE/OFFLINE BANNER ── */
#offBanner{position:fixed;top:0;left:0;right:0;background:var(--red);color:#fff;padding:8px 16px;text-align:center;font-size:12px;font-weight:600;z-index:400;display:none;align-items:center;justify-content:center;gap:8px}

/* ── ANIMATIONS ── */
@keyframes spin{to{transform:rotate(360deg)}}

<script>
// ══════════════════════════════════════════════════════════
//  ★  CONFIG
// ══════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbzJKTXVJYddd4xIhGfXSOLUv_KsLT6tJZki2wi66TPPYhA07mZsyablOzzQwnJYrJtnVA/exec';

const MASTER = {
  id:'admin', name:'SIONIQ Admin', email:'admin@sioniq.com', role:'Team Lead',
  av:'SA', col:'#4338ca', pass:'sio@123', username:'sioniqadmin',
  acc:['dashboard','works','tasks','reports','users','kanban','activity','team_dashboard'], on:true
};

const AC = {D:'dashboard',W:'works',T:'tasks',R:'reports',U:'users',K:'kanban',A:'activity',TD:'team_dashboard'};
const SS = {
  Assigned:{bg:'#dbeafe',fg:'#1e40af',d:'#3b82f6'},
  'In Progress':{bg:'#ede9fe',fg:'#5b21b6',d:'#8b5cf6'},
  Completed:{bg:'#fce7f3',fg:'#9d174d',d:'#ec4899'},
  Approved:{bg:'#dcfce7',fg:'#166534',d:'#22c55e'},
  Rejected:{bg:'#fee2e2',fg:'#991b1b',d:'#ef4444'},
  Reassigned:{bg:'#fef9c3',fg:'#854d0e',d:'#eab308'}
};
const PC = {Low:'#94a3b8',Medium:'#2563eb',High:'#d97706',Urgent:'#dc2626'};

// ── STATE ──
let users=[], works=[], tasks=[], nots=[], alog=[];
let CU=null, CV='dashboard', wF='all', tF='all', tS='', eF='all', tdS=null;
let nW_=1, nT_=100, nU_=1, nA_=1, syncInt=null, apiOk=false;

// ── SAVE LOCK: prevents duplicate submissions ──
let _saving=false;
function setBtnSaving(btnId,label){
  if(_saving)return false; // already saving — block
  _saving=true;
  const b=document.getElementById(btnId);
  if(b){b.disabled=true;b._orig=b.innerHTML;b.innerHTML=`<span style="display:inline-flex;align-items:center;gap:6px"><svg style="animation:spin 0.7s linear infinite" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>${label||'Saving...'}</span>`;b.style.opacity='0.75';}
  return true;
}
function clearBtnSaving(btnId){
  _saving=false;
  const b=document.getElementById(btnId);
  if(b&&b._orig){b.innerHTML=b._orig;b.disabled=false;b.style.opacity='1';delete b._orig;}
}

// ══════════════════════════════════════════════════════════
//  API LAYER
// ══════════════════════════════════════════════════════════
function showLD(m='Loading...'){document.getElementById('ldOv').classList.remove('hide');document.getElementById('ldMsg').textContent=m}
function hideLD(){document.getElementById('ldOv').classList.add('hide')}

async function apiGet(action){
  try{
    const r=await fetch(`${API_URL}?action=${action}`);
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    return d;
  }catch(e){console.error('GET',action,e);return null}
}

async function apiPost(action,payload){
  try{
    const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action,payload})});
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    return d;
  }catch(e){console.error('POST',action,e);return null}
}

// ── OPTIMISTIC SAVES: update UI instantly, write to sheet in background ──
// bgSave: fire-and-forget single call
function bgSave(action,payload){
  apiPost(action,payload).catch(e=>console.warn('[bgSave]',action,'failed:',e));
}
// bgSaveAll: run multiple saves in PARALLEL (not sequential) in background
function bgSaveAll(...calls){
  Promise.all(calls.map(([a,p])=>apiPost(a,p))).catch(e=>console.warn('[bgSaveAll] failed:',e));
}

async function checkConn(){
  const el=document.getElementById('connSt');
  el.className='lconn ld';el.textContent='⏳ Connecting...';
  const r=await apiGet('ping');
  if(r&&r.status==='ok'){el.className='lconn ok';el.textContent='✅ Connected to Google Sheets';apiOk=true}
  else{el.className='lconn er';el.textContent='❌ Cannot reach sheet — check API URL';apiOk=false}
}

async function loadFromSheet(){
  showLD('Syncing from Google Sheets...');
  const d=await apiGet('getAll');
  if(!d){hideLD();return false}

  users=(d.users||[]).map(u=>({
    id:String(u.id), name:u.name||'', email:u.email||'', role:u.role||'Junior',
    av:u.avatar||'??', col:u.color||'#666', pass:u.password||'',
    acc:(u.access||'').split(',').map(a=>a.trim()).filter(Boolean),
    on:u.active===true||u.active==='TRUE'
  }));

  works=(d.works||[]).map(w=>({
    id:parseInt(w.id)||0, title:w.title||'', desc:w.description||'',
    pri:w.priority||'Medium', cat:w.createdAt||'', cb:w.createdBy||'',
    ht:w.hasTask===true||w.hasTask==='TRUE'
  }));

  tasks=(d.tasks||[]).map(t=>({
    id:parseInt(t.id)||0, wk:parseInt(t.workId)||0, as:String(t.assignee||''),
    st:t.status||'Assigned', sd:t.startDate||'', ed:t.endDate||'',
    rc:parseInt(t.reassignCount)||0, pg:parseInt(t.progress)||0, cm:[], hi:[]
  }));

  (d.comments||[]).forEach(c=>{
    const t=tasks.find(x=>x.id===parseInt(c.taskId));
    if(t)t.cm.push({by:String(c.by||''),tx:c.text||'',dt:c.date||''});
  });
  (d.history||[]).forEach(h=>{
    const t=tasks.find(x=>x.id===parseInt(h.taskId));
    if(t)t.hi.push({a:h.action||'',d:h.date||'',b:String(h.by||'')});
  });
  alog=(d.activity||[]).map(a=>({id:parseInt(a.id)||0,u:String(a.userId||''),a:a.action||'',d:a.date||'',t:a.type||'task'}));

  nW_=works.length?Math.max(...works.map(w=>w.id))+1:1;
  nT_=tasks.length?Math.max(...tasks.map(t=>t.id))+1:100;
  nU_=users.length?Math.max(...users.map(u=>parseInt(u.id.replace(/\D/g,''))||0))+1:1;
  nA_=alog.length?Math.max(...alog.map(a=>a.id))+1:1;

  document.getElementById('syncSt').textContent='Synced '+new Date().toLocaleTimeString();
  hideLD();return true;
}

async function syncFromSheet(){
  toast('Syncing...','in');
  const ok=await loadFromSheet();
  if(ok){rA();toast('Synced!','ok')}else toast('Sync failed','er');
}

// ── SAVE HELPERS (all background — UI is instant, sheet syncs async) ──
const _uPl=u=>({id:u.id,name:u.name,email:u.email,role:u.role,avatar:u.av,color:u.col,password:u.pass,access:u.acc.join(','),active:u.on?'TRUE':'FALSE'});
const _wPl=w=>({id:w.id,title:w.title,description:w.desc,priority:w.pri,createdAt:w.cat,createdBy:w.cb,hasTask:w.ht?'TRUE':'FALSE'});
const _tPl=t=>({id:t.id,workId:t.wk,assignee:t.as,status:t.st,startDate:t.sd,endDate:t.ed,reassignCount:t.rc,progress:t.pg});
const svU=u=>bgSave('addUser',_uPl(u));
const upU=u=>bgSave('updateUser',_uPl(u));
const svW=w=>bgSave('addWork',_wPl(w));
const upW=w=>bgSave('updateWork',_wPl(w));
const svT=t=>bgSave('addTask',_tPl(t));
const upT=t=>bgSave('updateTask',_tPl(t));
const svC=(tid,c)=>bgSave('addComment',{id:Date.now(),taskId:tid,by:c.by,text:c.tx,date:c.dt});
const svH=(tid,h)=>bgSave('addHistory',{id:Date.now(),taskId:tid,action:h.a,date:h.d,by:h.b});
const svA=a=>bgSave('addActivity',{id:a.id,userId:a.u,action:a.a,date:a.d,type:a.t});

// ══════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════
const U=id=>{if(id==='admin')return MASTER;return users.find(u=>u.id===id)||null};
const W=id=>works.find(w=>w.id===id)||null;
const T4W=wid=>tasks.find(t=>t.wk===wid)||null;
const td=()=>new Date().toISOString().split('T')[0];
const fD=d=>{if(!d)return'—';return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})};
const dDf=(a,b)=>Math.ceil((new Date(a+'T00:00:00')-new Date(b+'T00:00:00'))/86400000);
const isOD=t=>t.ed&&new Date(t.ed)<new Date(td()+'T00:00:00')&&!['Approved','Completed'].includes(t.st);
const isTL=()=>CU?.role==='Team Lead';
const hA=k=>CU?.acc?.includes(k);
const aCt=uid=>tasks.filter(t=>t.as===uid&&['Assigned','In Progress','Reassigned'].includes(t.st)).length;

function sB(s){const x=SS[s]||{bg:'#eee',fg:'#666',d:'#999'};return`<span class="bdg" style="background:${x.bg};color:${x.fg}"><span class="dt" style="background:${x.d}"></span>${s}</span>`}
function aH(u,sz=24){if(!u)return'';return`<div class="av" style="width:${sz}px;height:${sz}px;font-size:${sz<26?9:11}px;background:${u.col}14;color:${u.col}">${u.av}</div>`}
function pB(p){return`<span style="font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;background:${PC[p]||'#ccc'}10;color:${PC[p]||'#ccc'}">${p||''}</span>`}
function tL(ed){if(!ed)return'';const d=dDf(ed,td());if(d<0)return`<span style="color:var(--red);font-weight:700;font-size:9px">${Math.abs(d)}d overdue</span>`;if(d===0)return`<span style="color:var(--red);font-weight:700;font-size:9px">Due today!</span>`;if(d<=2)return`<span style="color:var(--ylw);font-weight:700;font-size:9px">${d}d left</span>`;return`<span style="color:var(--tx3);font-size:9px">${d}d left</span>`}
function ring(pct,col,sz=52,sw=5){const r=(sz-sw)/2,c=2*Math.PI*r,o=c-(pct/100)*c;return`<div class="mr" style="width:${sz}px;height:${sz}px"><svg width="${sz}" height="${sz}"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#eee" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${c}" stroke-dashoffset="${o}" stroke-linecap="round"/></svg><div class="mrv" style="color:${col}">${pct}%</div></div>`}

function toast(m,t='in'){const w=document.getElementById('tW');const e=document.createElement('div');e.className=`tst ${t==='ok'||t==='success'?'ok':t==='er'||t==='error'?'er':'in'}`;e.textContent=m;w.appendChild(e);setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),300)},3000)}
function addN(m,tid,fu){nots.unshift({id:Date.now(),msg:m,tm:'Just now',rd:false,tid,fu:fu||CU?.id||'admin'});rnB()}
function logA(a,t){const ac={id:nA_++,u:CU.id,a,d:td(),t};alog.unshift(ac);svA(ac)}

function eC(uid){
  const et=tasks.filter(t=>t.as===uid);const now=td();
  const run=et.filter(t=>['Assigned','In Progress','Reassigned'].includes(t.st));
  const comp=et.filter(t=>t.st==='Completed');const appr=et.filter(t=>t.st==='Approved');
  const onT=appr.filter(t=>{const ch=t.hi.find(h=>h.a.toLowerCase().includes('complete'));return ch&&t.ed&&ch.d<=t.ed});
  const dTT=run.filter(t=>t.ed===now);const d2T=run.filter(t=>{const d=dDf(t.ed,now);return d>=0&&d<=2});
  const odT=run.filter(isOD);
  return{total:et.length,run:run.length,comp:comp.length,appr:appr.length,reas:et.filter(t=>t.st==='Reassigned').length,od:odT.length,onT:onT.length,dT:dTT.length,d2:d2T.length,rate:appr.length?Math.round(onT.length/appr.length*100):0,runT:run,dTT,d2T,odT,compT:comp,apprT:appr};
}
function eCA(){
  const run=tasks.filter(t=>['Assigned','In Progress','Reassigned'].includes(t.st));
  const appr=tasks.filter(t=>t.st==='Approved');const now=td();
  const onT=appr.filter(t=>{const ch=t.hi.find(h=>h.a.toLowerCase().includes('complete'));return ch&&t.ed&&ch.d<=t.ed});
  const dTT=run.filter(t=>t.ed===now);const d2T=run.filter(t=>{const d=dDf(t.ed,now);return d>=0&&d<=2});
  const odT=run.filter(isOD);
  return{total:tasks.length,run:run.length,comp:tasks.filter(t=>t.st==='Completed').length,appr:appr.length,reas:tasks.filter(t=>t.st==='Reassigned').length,od:odT.length,onT:onT.length,dT:dTT.length,d2:d2T.length,rate:appr.length?Math.round(onT.length/appr.length*100):0,runT:run,dTT,d2T,odT};
}

function urgC(title,cnt,col,bg,bdr,list){
  let h=`<div class="uc" style="background:${bg};border-color:${bdr}"><h4>${title}<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:${col};color:#fff;margin-left:6px">${cnt}</span></h4>`;
  if(!list.length)h+=`<div style="font-size:11px;color:var(--tx2);padding:4px 0">None — all clear! ✨</div>`;
  else list.slice(0,4).forEach(t=>{const w=W(t.wk);h+=`<div class="utask" onclick="oTD(${t.id})"><div class="pb" style="height:12px;background:${PC[w?.pri]||'#ccc'}"></div><span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500">${w?.title||''}</span><span class="utm" style="color:${col}">${tL(t.ed)}</span></div>`});
  if(list.length>4)h+=`<div style="font-size:9px;color:${col};font-weight:600;margin-top:3px">+${list.length-4} more</div>`;
  return h+'</div>'
}

// ══════════════════════════════════════════════════════════
//  LOGIN / LOGOUT
// ══════════════════════════════════════════════════════════
async function doLI(){
  const uname=document.getElementById('lU').value.trim();
  const pass=document.getElementById('lP').value;
  if(!uname||!pass){toast('Enter credentials','er');return}

  // Master admin — works offline too
  if(uname==='sioniqadmin'&&pass==='sio@123'){
    CU={...MASTER};
    if(apiOk){await loadFromSheet()}
    startApp();
    toast(`Welcome, Master Admin! 👋`,'ok');
    return;
  }

  // Regular user — needs sheet
  if(!apiOk){toast('Cannot connect to server','er');return}
  showLD('Authenticating...');
  await loadFromSheet();hideLD();

  const u=users.find(x=>x.email===uname||(x.email||'').split('@')[0]===uname||x.name.toLowerCase()===uname.toLowerCase());
  if(!u||pass!==u.pass||!u.on){document.getElementById('lE').style.display='block';return}
  document.getElementById('lE').style.display='none';
  CU=u;
  startApp();
  toast(`Welcome, ${CU.name}! 👋`,'ok');
}

function startApp(){
  _saving=false; // reset any stale lock
  CV=CU.acc[0]||'dashboard';
  document.getElementById('LS').style.display='none';
  document.getElementById('AP').style.display='block';
  if(apiOk)syncInt=setInterval(()=>loadFromSheet().then(ok=>{if(ok){document.getElementById('syncSt').textContent='Synced '+new Date().toLocaleTimeString();rA()}}),60000);
  rA();
}

function doLO(){
  _saving=false;
  if(syncInt)clearInterval(syncInt);syncInt=null;
  CU=null;
  document.getElementById('AP').style.display='none';
  document.getElementById('LS').style.display='flex';
  document.getElementById('lP').value='';
  document.getElementById('lU').value='';
}

//  APP RENDER
// ══════════════════════════════════════════════════════════
function rA(){rSb();rTb();rnB();rnL();rP()}

function rSb(){
  document.getElementById('sbU').innerHTML=`${aH(CU,32)}<div><div class="un">${CU.name}</div><div class="ur">${CU.role}</div></div>`;
  const items=[
    {k:AC.D,l:'My Dashboard',i:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>'},
    {k:AC.TD,l:'Team Dashboards',i:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/>'},

  <div style="padding:18px 20px">
    <div style="margin-bottom:13px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:600;color:var(--tx2)">Progress</span><span style="font-size:11px;font-weight:700;font-family:var(--mono);color:var(--ac)">${t.pg||0}%</span></div>

function sTT(t,b){document.querySelectorAll('.tbt').forEach(x=>x.classList.remove('on'));b.classList.add('on');document.getElementById('td-c').classList.toggle('hide',t!=='c');document.getElementById('td-h').classList.toggle('hide',t!=='h')}
function uPg(tid,v){const i=tasks.findIndex(t=>t.id===tid);if(i>=0){tasks[i].pg=parseInt(v);clearTimeout(window._pt);window._pt=setTimeout(()=>bgSave('updateTask',_tPl(tasks[i])),1200)}}

function aCm(tid){
  if(_saving)return;
  const inp=document.getElementById('cmI');const tx=inp?.value?.trim();if(!tx)return;
  const i=tasks.findIndex(t=>t.id===tid);if(i<0)return;
  if(!setBtnSaving('cmBtn_'+tid,'...'))return;
  const cm={by:CU.id,tx,dt:td()};
  tasks[i].cm.push(cm);   // instant
  inp.value='';
  toast('Comment added','ok');
  oTD(tid);               // refresh modal instantly
  bgSave('addComment',{id:Date.now(),taskId:tid,by:cm.by,text:cm.tx,date:cm.dt});
  clearBtnSaving('cmBtn_'+tid);
}

// TASK ACTIONS — all optimistic (instant UI, background sheet sync)
function doSt(tid){
  if(_saving)return;
  const i=tasks.findIndex(t=>t.id===tid);if(i<0)return;
  if(!setBtnSaving('stBtn_'+tid,'Starting...'))return;
  tasks[i].st='In Progress';tasks[i].pg=tasks[i].pg||10;
  const hi={a:'Started work',d:td(),b:CU.id};tasks[i].hi.push(hi);
  const ttl=W(tasks[i].wk)?.title||'';
  logA(`started '${ttl}'`,'task');
  toast('Task started!','ok');
  cM();
  bgSaveAll(['updateTask',_tPl(tasks[i])],['addHistory',{id:Date.now(),taskId:tid,action:hi.a,date:hi.d,by:hi.b}]);
  clearBtnSaving('stBtn_'+tid);
}

function doCo(tid){
  if(_saving)return;
  const i=tasks.findIndex(t=>t.id===tid);if(i<0)return;
  if(!setBtnSaving('coBtn_'+tid,'Saving...'))return;
  const w=W(tasks[i].wk);
  tasks[i].st='Completed';tasks[i].pg=100;
  const hi={a:'Marked complete',d:td(),b:CU.id};tasks[i].hi.push(hi);
  addN(`${CU.name} completed '${w?.title}'`,tid,CU.id==='admin'?'admin':'u1');
  logA(`completed '${w?.title}'`,'task');
  toast('Marked complete!','ok');
  cM();
  bgSaveAll(['updateTask',_tPl(tasks[i])],['addHistory',{id:Date.now(),taskId:tid,action:hi.a,date:hi.d,by:hi.b}]);
  clearBtnSaving('coBtn_'+tid);
}

function doAp(tid){
  if(_saving)return;
  const i=tasks.findIndex(t=>t.id===tid);if(i<0)return;
  if(!setBtnSaving('apBtn_'+tid,'Approving...'))return;
  const w=W(tasks[i].wk);
  tasks[i].st='Approved';
  const hi={a:'Approved by TL',d:td(),b:CU.id};tasks[i].hi.push(hi);
  addN(`TL approved '${w?.title}'`,tid,tasks[i].as);
  logA(`approved '${w?.title}'`,'approve');
  toast('Task approved!','ok');
  cM();
  bgSaveAll(['updateTask',_tPl(tasks[i])],['addHistory',{id:Date.now(),taskId:tid,action:hi.a,date:hi.d,by:hi.b}]);
  clearBtnSaving('apBtn_'+tid);
}

function doRj(tid){
  if(_saving)return;
  const r=document.getElementById('rjR')?.value?.trim();
  const na=document.getElementById('rjA')?.value;
  if(!r||!na){toast('Fill all fields','er');return}
  const i=tasks.findIndex(t=>t.id===tid);if(i<0)return;
  if(!setBtnSaving('rjBtn_'+tid,'Saving...'))return;
  const w=W(tasks[i].wk);
  tasks[i].st='Reassigned';tasks[i].as=na;tasks[i].rc=(tasks[i].rc||0)+1;tasks[i].pg=0;
  const h1={a:`Rejected – ${r}`,d:td(),b:CU.id};
  const h2={a:`Reassigned to ${U(na).name}`,d:td(),b:CU.id};
  tasks[i].hi.push(h1,h2);
  addN(`TL rejected & reassigned '${w?.title}'`,tid,na);
  logA(`rejected '${w?.title}', reassigned to ${U(na).name}`,'reject');
  toast('Task reassigned','in');
  cM();
  bgSaveAll(
    ['updateTask',_tPl(tasks[i])],
    ['addHistory',{id:Date.now(),taskId:tid,action:h1.a,date:h1.d,by:h1.b}],
    ['addHistory',{id:Date.now()+1,taskId:tid,action:h2.a,date:h2.d,by:h2.b}]
  );
  clearBtnSaving('rjBtn_'+tid);
}

function tUA(uid,el){const i=users.findIndex(u=>u.id===uid);if(i>=0){users[i].on=!users[i].on;el.classList.toggle('on');document.getElementById('uSt').textContent=users[i].on?'Active':'Off'}}

function dEU(uid){
  if(_saving)return;
  const i=users.findIndex(u=>u.id===uid);if(i<0)return;
  if(!setBtnSaving('euSubmit','Saving...'))return;

  users[i].role=document.getElementById('euR').value;
  const np=document.getElementById('euP').value.trim();if(np)users[i].pass=np;

// ══════════════════════════════════════════════════════════
//  PWA — SERVICE WORKER + INSTALL PROMPT
// ══════════════════════════════════════════════════════════
let deferredPrompt=null;

if('serviceWorker' in navigator){
  window.addEventListener('load',async()=>{
    try{
      const reg=await navigator.serviceWorker.register('/sw.js');
      console.log('[PWA] SW registered:',reg.scope);
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        nw.addEventListener('statechange',()=>{if(nw.state==='activated')toast('App updated — refresh for latest','in')});
      });
    }catch(e){console.warn('[PWA] SW registration failed:',e)}
  });
  navigator.serviceWorker.addEventListener('message',e=>{if(e.data?.type==='SYNC_READY'&&CU&&apiOk)syncFromSheet()});
}

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  if(!window.matchMedia('(display-mode: standalone)').matches)showPWABar();
});

function showPWABar(){
  if(document.getElementById('pwaBar'))return;
  const bar=document.createElement('div');bar.id='pwaBar';
  bar.innerHTML=`<div class="pi"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
    <div class="pt"><b>Install ResearchFlow</b><span>Add to home screen</span></div>
    <button onclick="installPWA()" style="padding:7px 14px;border-radius:7px;border:none;background:var(--ac);color:#fff;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap">Install</button>
    <button onclick="this.parentElement.remove()" style="background:none;border:none;color:rgba(255,255,255,0.3);font-size:17px;cursor:pointer;padding:2px 4px">✕</button>`;
  document.body.appendChild(bar);
}

async function installPWA(){
  if(!deferredPrompt){toast('Open in Chrome/Edge to install','in');return}
  deferredPrompt.prompt();
  const r=await deferredPrompt.userChoice;
  if(r.outcome==='accepted')toast('Installed! Find it on your home screen 🎉','ok');
  deferredPrompt=null;document.getElementById('pwaBar')?.remove();
}

window.addEventListener('appinstalled',()=>{deferredPrompt=null;document.getElementById('pwaBar')?.remove()});

// Online / Offline
window.addEventListener('online',()=>{
  document.getElementById('offBanner').style.display='none';
  toast('Back online! Syncing...','ok');
  if(CU&&apiOk)syncFromSheet();
});
window.addEventListener('offline',()=>{
  document.getElementById('offBanner').style.display='flex';
  toast('You are offline','er');
});
